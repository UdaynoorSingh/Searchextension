        <div class="modes-container">
            <div class="area-tags">
                <div class="tag">
                    <div class="tag-name">Main</div>
                    <input checked="true" type="checkbox" name="" id="">
                </div>
                <div class="tag">
                    <div class="tag-name">Nav</div>
                    <input checked="true" type="checkbox" name="" id="">
                </div>
                <div class="tag">
                    <div class="tag-name">Code</div>
                    <input checked="true" type="checkbox" name="" id="">
                </div>
            </div>
            <div class="modes">
                <div class="mode">
                    <div class="mode-name">Normal</div>
                    <input type="checkbox" name="normal" id="">
                </div>
                <div class="mode">
                    <div class="mode-name">RegEx</div>
                    <input type="checkbox" name="regex" id="">
                </div>
                <div class="mode">
                    <div class="mode-name">Fuzzy</div>
                    <input type="checkbox" name="fuzzy" id="">
                </div>
                <div class="mode">
                    <div class="mode-name">Semantic</div>
                    <input type="checkbox" name="semantic" id="">
                </div>
                <div class="mode">
                    <div class="mode-name">Phonetic</div>
                    <input type="checkbox" name="phonetic" id="">
                </div>
            </div>
        </div>
    </div>
    <script>
        const container = document.querySelector("#search-container");

        const uiStates = {
            expanded: false,
            matchCase: false,
            matchWhole: false,
            searchArea: {
                main: true,
                nav: true,
                code: true
            },
            normal: true,
            semantic: false,
            phonetic: false,
            regex: false,
            fuzzy: false
        };

        const el = document.getElementById('drag-handle');
        let isDragging = false, offsetX, offsetY;

        el.addEventListener('mousedown', (e) => {
            isDragging = true;

            const rect = container.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            el.classList.add("grabbed");
        });

        // Change document to el
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;

            container.style.left = `${e.clientX - offsetX}px`;
            container.style.top = `${e.clientY - offsetY}px`;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            el.classList.remove("grabbed");
        });

        const matchCaseBtn = document.querySelector("#match-case-btn");
        const matchWholeBtn = document.querySelector("#match-whole-btn");

        matchCaseBtn.addEventListener("click", (e) => {
            if (uiStates.matchCase) {
                uiStates.matchCase = false;
                e.currentTarget.classList.remove("active");
            }
            else {
                uiStates.matchCase = true;
                e.currentTarget.classList.add("active");
            }
        });

        matchWholeBtn.addEventListener("click", (e) => {
            if (uiStates.matchWhole) {
                uiStates.matchWhole = false;
                e.currentTarget.classList.remove("active");
            }
            else {
                uiStates.matchWhole = true;
                e.currentTarget.classList.add("active");
            }
        });

        const upArrow = document.querySelector(".tool-btn#up-arrow");
        const downArrow = document.querySelector(".tool-btn#down-arrow");

        const expandBtn = document.querySelector("#expand-btn");
        const expandBtnSvg = expandBtn.querySelector("svg");

        const modesContainer = document.querySelector(".modes-container");

        expandBtn.addEventListener("click", (e) => {
            if (uiStates.expanded) {
                uiStates.expanded = false;

                expandBtnSvg.classList.remove("rotate");
                modesContainer.classList.remove("opened");
            }
            else {
                uiStates.expanded = true;
                expandBtnSvg.classList.add("rotate");
                modesContainer.classList.add("opened");
            }
        });

        const modeCheckboxes = document.querySelectorAll('.modes input[type="checkbox"]');


        modeCheckboxes.forEach(checkbox => {
            checkbox.checked = uiStates[checkbox.name];

            checkbox.addEventListener('click', (e) => {
                if (uiStates[checkbox.name]) {
                    e.preventDefault();
                    return;
                }

                modeCheckboxes.forEach(cb => {
                    cb.checked = false;
                    uiStates[cb.name] = false;
                });

                checkbox.checked = true;
                uiStates[checkbox.name] = true;
            });
        });
    </script>
